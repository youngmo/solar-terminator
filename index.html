<!DOCTYPE html>
<!--
  Solar Terminator — Cesium-based realtime 3D globe
  Version: 0.5.1 (2026-05-09)
  Changelog (most recent on top):
    0.5.1  Fix "globe drifts on its own" — switch to requestRenderMode,
           ellipsoid terrain, throttled 1Hz updates, cancelFlight on init.
           Add visible version label.
    0.5.0  Camera fixes — disable inertia, force pitch=-90 on setView/flyTo.
    0.4.0  Cesium rewrite for tile-based zoom (Google Maps-style).
    0.3.0  Geolocation + user marker (Three.js version).
    0.2.0  Time slider + date picker (Three.js version).
    0.1.0  Initial Three.js globe with day/night shader.
-->
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar Terminator v0.5.1 — 실시간 지구본 (Cesium)</title>
  <meta name="description" content="현재 시각 기준으로 태양빛이 닿는 지구 영역을 보여주는 Cesium 기반 실시간 3D 지구본">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Sora:wght@300;500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/cesium@1.122.0/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #0a0d14;
      color: #e8e8ec;
      font-family: 'Sora', system-ui, sans-serif;
      font-weight: 300;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    main {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 24px 32px 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
      z-index: 10;
    }
    header h1 {
      font-family: 'Sora', sans-serif;
      font-weight: 500;
      font-size: 14px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #e8e8ec;
    }
    header h1 .accent { color: #f4a261; }
    header .meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #787a85;
      text-align: right;
      line-height: 1.6;
    }

    #cesiumContainer {
      flex: 1;
      position: relative;
      width: 100%;
    }
    .cesium-viewer-toolbar,
    .cesium-viewer-fullscreenContainer,
    .cesium-viewer-vrContainer { display: none; }
    .cesium-credit-logoContainer { display: none !important; }

    #credits {
      position: absolute;
      bottom: 6px;
      right: 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: #545560;
      z-index: 8;
      pointer-events: auto;
      max-width: 360px;
      text-align: right;
    }
    #credits a { color: #787a85; text-decoration: none; }
    #credits a:hover { color: #a0a2ad; }

    .panel {
      position: absolute;
      bottom: 24px;
      left: 32px;
      padding: 16px 20px;
      background: rgba(15, 18, 26, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 0.5px solid rgba(255, 255, 255, 0.08);
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      line-height: 1.7;
      z-index: 9;
      min-width: 360px;
    }
    .panel .row { display: flex; justify-content: space-between; align-items: center; gap: 24px; }
    .panel .row + .row { margin-top: 4px; }
    .panel .lbl { color: #787a85; font-weight: 300; flex-shrink: 0; }
    .panel .val { color: #e8e8ec; font-weight: 400; }
    .panel .val.warm { color: #f4a261; }
    .panel hr {
      border: 0;
      border-top: 0.5px solid rgba(255, 255, 255, 0.08);
      margin: 10px 0;
    }

    .ctrl-row { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
    .ctrl-row .lbl { width: 64px; }

    .date-in {
      flex: 1;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      background: rgba(255, 255, 255, 0.04);
      color: #e8e8ec;
      border: 0.5px solid rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      padding: 4px 8px;
      color-scheme: dark;
      outline: none;
    }
    .date-in:focus { border-color: rgba(244, 162, 97, 0.5); }

    .slider {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 18px;
      background: transparent;
      cursor: pointer;
      outline: none;
    }
    .slider::-webkit-slider-runnable-track { height: 2px; background: rgba(255, 255, 255, 0.15); border-radius: 1px; }
    .slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #f4a261; margin-top: -5px; border: none; }
    .slider::-moz-range-track { height: 2px; background: rgba(255, 255, 255, 0.15); border-radius: 1px; border: none; }
    .slider::-moz-range-thumb { width: 12px; height: 12px; border-radius: 50%; background: #f4a261; border: none; cursor: pointer; }

    .time-display {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #e8e8ec;
      min-width: 56px;
      text-align: right;
      flex-shrink: 0;
    }

    .now-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      background: transparent;
      color: #f4a261;
      border: 0.5px solid rgba(244, 162, 97, 0.4);
      border-radius: 3px;
      padding: 4px 10px;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
      flex-shrink: 0;
    }
    .now-btn:hover { background: rgba(244, 162, 97, 0.1); border-color: rgba(244, 162, 97, 0.7); }
    .now-btn.live {
      color: #545560;
      border-color: rgba(255, 255, 255, 0.08);
      cursor: default;
      background: transparent;
    }

    .locate-btn {
      flex: 1;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.05em;
      background: transparent;
      color: #e8e8ec;
      border: 0.5px solid rgba(255, 255, 255, 0.15);
      border-radius: 3px;
      padding: 6px 10px;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }
    .locate-btn:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.3);
    }
    .locate-btn:disabled { opacity: 0.5; cursor: progress; }
    .locate-btn.error { color: #e24b4a; border-color: rgba(226, 75, 74, 0.4); }
    .locate-btn.success { color: #5dcaa5; border-color: rgba(93, 202, 165, 0.4); }

    .mode-tag {
      display: inline-block;
      font-size: 9px;
      letter-spacing: 0.15em;
      padding: 2px 6px;
      border-radius: 2px;
      margin-left: 8px;
      vertical-align: middle;
    }
    .mode-tag.live   { color: #5dcaa5; background: rgba(93, 202, 165, 0.1); border: 0.5px solid rgba(93, 202, 165, 0.3); }
    .mode-tag.manual { color: #f4a261; background: rgba(244, 162, 97, 0.1); border: 0.5px solid rgba(244, 162, 97, 0.3); }

    .hint {
      position: absolute;
      bottom: 30px;
      right: 32px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: #545560;
      letter-spacing: 0.05em;
      pointer-events: none;
      z-index: 9;
    }

    .loading-status {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: #787a85;
      pointer-events: none;
      z-index: 5;
      transition: opacity 0.4s ease;
    }

    @media (max-width: 640px) {
      header { padding: 16px 18px 0; }
      header h1 { font-size: 12px; }
      header .meta { font-size: 10px; }
      .panel { left: 18px; right: 18px; bottom: 18px; min-width: 0; padding: 12px 14px; font-size: 11px; }
      .panel .lbl { font-size: 10px; }
      .ctrl-row .lbl { width: 48px; }
      .hint { display: none; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Solar <span class="accent">·</span> Terminator</h1>
      <div class="meta">
        v0.5.1 · 2026-05-09<br>
        CESIUM-POWERED · TILED 3D
      </div>
    </header>

    <div id="cesiumContainer">
      <div class="loading-status" id="loadingStatus">Cesium 초기화 중…</div>
    </div>

    <div class="panel">
      <div class="row">
        <span class="lbl">UTC<span class="mode-tag live" id="mode-tag">LIVE</span></span>
        <span class="val" id="utc">—</span>
      </div>
      <div class="row">
        <span class="lbl">LOCAL</span>
        <span class="val" id="local">—</span>
      </div>
      <hr>
      <div class="row">
        <span class="lbl">SUBSOLAR LAT</span>
        <span class="val warm" id="sun-lat">—</span>
      </div>
      <div class="row">
        <span class="lbl">SUBSOLAR LON</span>
        <span class="val warm" id="sun-lon">—</span>
      </div>
      <hr>
      <div class="ctrl-row">
        <span class="lbl">DATE</span>
        <input type="date" id="date-input" class="date-in">
        <button id="now-btn" class="now-btn live">NOW</button>
      </div>
      <div class="ctrl-row">
        <span class="lbl">UTC TIME</span>
        <input type="range" id="time-slider" class="slider" min="0" max="1439" step="1" value="0">
        <span id="time-display" class="time-display">00:00</span>
      </div>
      <div class="ctrl-row">
        <span class="lbl">VIEW</span>
        <button id="locate-btn" class="locate-btn">내 위치로 이동</button>
      </div>
      <div class="row" id="user-loc-row" style="display:none">
        <span class="lbl">MY LOCATION</span>
        <span class="val" id="user-loc">—</span>
      </div>
    </div>

    <div class="hint">DRAG · SCROLL TO ZOOM · RIGHT-DRAG TO TILT</div>
    <div id="credits"></div>
  </main>

  <script>
    window.CESIUM_BASE_URL = 'https://cdn.jsdelivr.net/npm/cesium@1.122.0/Build/Cesium/';
  </script>
  <script src="https://cdn.jsdelivr.net/npm/cesium@1.122.0/Build/Cesium/Cesium.js"></script>
  <script>
  (function () {
    'use strict';

    const credits = document.getElementById('credits');
    const loadingStatus = document.getElementById('loadingStatus');

    // ──────────────────────────────────────────────────────────────
    // Imagery: ESRI World Imagery (no API key required, satellite tiles)
    // ──────────────────────────────────────────────────────────────
    const imageryPromise = Cesium.ArcGisMapServerImageryProvider.fromUrl(
      'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer',
      { enablePickFeatures: false }
    );

    const viewer = new Cesium.Viewer('cesiumContainer', {
      baseLayer: Cesium.ImageryLayer.fromProviderAsync(imageryPromise),
      animation: false,
      timeline: false,
      baseLayerPicker: false,
      geocoder: false,
      homeButton: false,
      sceneModePicker: false,
      navigationHelpButton: false,
      fullscreenButton: false,
      infoBox: false,
      selectionIndicator: false,
      creditContainer: credits
    });

    // ──────────────────────────────────────────────────────────────
    // Lighting: enable sun-based day/night terminator
    //   Cesium uses Simon1994 planetary positions internally, so the
    //   terminator location is astronomically accurate (no manual EoT).
    //
    //   We deliberately leave dynamicAtmosphereLighting OFF — the
    //   atmosphere effect causes subtle frame-to-frame variation that
    //   reads as "the globe is drifting" when viewed from far away.
    //   The day/night terminator on the surface is unaffected.
    // ──────────────────────────────────────────────────────────────
    viewer.scene.globe.enableLighting = true;
    viewer.scene.globe.dynamicAtmosphereLighting = false;
    viewer.scene.globe.dynamicAtmosphereLightingFromSun = false;

    // Smooth ellipsoid (no terrain). Avoids tiny camera adjustments as
    // terrain heights stream in.
    viewer.terrainProvider = new Cesium.EllipsoidTerrainProvider();

    // We control the clock from our slider/live mode logic
    viewer.clock.shouldAnimate = false;

    // Render only when something changes (user input, requestRender call).
    // This is the primary fix for "globe moves on its own": the default
    // continuous 60Hz render loop, combined with per-frame lighting
    // updates, can produce subtle visual drift. With on-demand rendering
    // the scene is bit-exact stable until we explicitly request a redraw.
    viewer.scene.requestRenderMode = true;
    viewer.scene.maximumRenderTimeChange = Infinity;

    // ──────────────────────────────────────────────────────────────
    // Camera control tuning
    //   Cesium's defaults include "inertia" — after dragging or zooming
    //   the camera coasts with friction. Visually this makes the globe
    //   look like it keeps moving on its own. We disable it for a more
    //   deterministic feel.
    // ──────────────────────────────────────────────────────────────
    const sc = viewer.scene.screenSpaceCameraController;
    sc.inertiaSpin = 0;
    sc.inertiaTranslate = 0;
    sc.inertiaZoom = 0;
    sc.minimumZoomDistance = 500;          // 500 m
    sc.maximumZoomDistance = 80000000;     // 80,000 km

    // ──────────────────────────────────────────────────────────────
    // Initial view: orbit altitude over Asia, looking straight down
    //   We MUST specify orientation explicitly. setView with only a
    //   destination keeps the camera's previous orientation (which is
    //   Cesium's default "home view" angle), producing a horizon /
    //   limb view rather than a top-down globe view.
    // ──────────────────────────────────────────────────────────────
    viewer.camera.setView({
      destination: Cesium.Cartesian3.fromDegrees(135, 25, 22000000),
      orientation: {
        heading: 0,
        pitch: Cesium.Math.toRadians(-90),
        roll: 0
      }
    });
    // Cancel any residual flight animation that Cesium might have queued
    viewer.camera.cancelFlight();

    console.log('%cSolar Terminator', 'color:#f4a261;font-size:14px;font-weight:600');
    console.log('Version 0.5.1 (2026-05-09) — Cesium build');

    // Hide loading message after the first frame finishes rendering
    viewer.scene.postRender.addEventListener(function once() {
      loadingStatus.style.opacity = '0';
      setTimeout(() => { loadingStatus.style.display = 'none'; }, 500);
      viewer.scene.postRender.removeEventListener(once);
    });

    // ──────────────────────────────────────────────────────────────
    // DOM refs
    // ──────────────────────────────────────────────────────────────
    const elUTC      = document.getElementById('utc');
    const elLocal    = document.getElementById('local');
    const elLat      = document.getElementById('sun-lat');
    const elLon      = document.getElementById('sun-lon');
    const elDate     = document.getElementById('date-input');
    const elSlider   = document.getElementById('time-slider');
    const elTimeDisp = document.getElementById('time-display');
    const elNowBtn   = document.getElementById('now-btn');
    const elModeTag  = document.getElementById('mode-tag');
    const elLocateBtn = document.getElementById('locate-btn');
    const elUserLocRow = document.getElementById('user-loc-row');
    const elUserLoc  = document.getElementById('user-loc');

    let manualDate = null;
    let userMarker = null;

    // ──────────────────────────────────────────────────────────────
    // Formatting helpers
    // ──────────────────────────────────────────────────────────────
    function pad(n) { return String(n).padStart(2, '0'); }
    function fmtTime(d) {
      return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate())
        + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
    }
    function fmtUTC(d) {
      return d.getUTCFullYear() + '-' + pad(d.getUTCMonth() + 1) + '-' + pad(d.getUTCDate())
        + ' ' + pad(d.getUTCHours()) + ':' + pad(d.getUTCMinutes()) + ':' + pad(d.getUTCSeconds());
    }
    function fmtLatLon(lat, lon) {
      let lonN = lon;
      while (lonN > 180)  lonN -= 360;
      while (lonN < -180) lonN += 360;
      return {
        lat: Math.abs(lat).toFixed(2) + '° ' + (lat >= 0 ? 'N' : 'S'),
        lon: Math.abs(lonN).toFixed(2) + '° ' + (lonN >= 0 ? 'E' : 'W')
      };
    }
    function dateInputValue(d) {
      return d.getUTCFullYear() + '-' + pad(d.getUTCMonth() + 1) + '-' + pad(d.getUTCDate());
    }
    function sliderMinutes(d) {
      return d.getUTCHours() * 60 + d.getUTCMinutes();
    }

    // ──────────────────────────────────────────────────────────────
    // Subsolar point (with equation-of-time correction)
    //   δ ≈ 23.44° · sin(B),     B = 2π · (N − 81) / 365
    //   EoT (min) ≈ 9.87 sin(2B) − 7.53 cos(B) − 1.5 sin(B)
    //   λ_sun = (12 − (UTC + EoT/60)) · 15°
    // Note: the visual day/night terminator on the globe is computed by
    // Cesium with full precision (Simon 1994). The HUD readout below
    // uses this simpler closed-form so users can see the numbers without
    // round-tripping through Cesium's astronomy module.
    // ──────────────────────────────────────────────────────────────
    function getSubsolar(date) {
      const startUTC = Date.UTC(date.getUTCFullYear(), 0, 0);
      const dayOfYear = Math.floor((date.getTime() - startUTC) / 86400000);
      const B = 2 * Math.PI * (dayOfYear - 81) / 365;
      const decl = 23.44 * Math.sin(B);
      const eotMin = 9.87 * Math.sin(2 * B) - 7.53 * Math.cos(B) - 1.5 * Math.sin(B);
      const utcH = date.getUTCHours() + date.getUTCMinutes() / 60 + date.getUTCSeconds() / 3600;
      const trueSolarH = utcH + eotMin / 60;
      const lonDeg = (12 - trueSolarH) * 15;
      return { lat: decl, lon: lonDeg };
    }

    // ──────────────────────────────────────────────────────────────
    // Mode handling
    // ──────────────────────────────────────────────────────────────
    function setLiveMode() {
      manualDate = null;
      elNowBtn.classList.add('live');
      elModeTag.classList.remove('manual');
      elModeTag.classList.add('live');
      elModeTag.textContent = 'LIVE';
    }
    function setManualMode() {
      elNowBtn.classList.remove('live');
      elModeTag.classList.remove('live');
      elModeTag.classList.add('manual');
      elModeTag.textContent = 'MANUAL';
    }
    function buildManualDate() {
      const dateStr = elDate.value;
      const minutes = parseInt(elSlider.value, 10) || 0;
      const parts = dateStr.split('-');
      const y = parseInt(parts[0], 10);
      const m = parseInt(parts[1], 10) - 1;
      const day = parseInt(parts[2], 10);
      const hh = Math.floor(minutes / 60);
      const mm = minutes % 60;
      return new Date(Date.UTC(y, m, day, hh, mm, 0));
    }
    function updateSliderDisplay() {
      const minutes = parseInt(elSlider.value, 10) || 0;
      const hh = Math.floor(minutes / 60);
      const mm = minutes % 60;
      elTimeDisp.textContent = pad(hh) + ':' + pad(mm);
    }

    // ──────────────────────────────────────────────────────────────
    // Throttled HUD + clock update
    //   Previously this ran every frame via scene.preRender. With
    //   requestRenderMode now ON, we run the update on a 1-second
    //   interval instead. The day/night terminator drifts at only
    //   15° per hour, so 1 Hz lighting updates are visually smooth.
    //   On user input (slider, date pick) we trigger an immediate
    //   update so it feels instantaneous.
    // ──────────────────────────────────────────────────────────────
    function update() {
      const date = (manualDate !== null) ? manualDate : new Date();
      viewer.clock.currentTime = Cesium.JulianDate.fromDate(date);

      elUTC.textContent   = fmtUTC(date);
      elLocal.textContent = fmtTime(date);
      const sub = getSubsolar(date);
      const f = fmtLatLon(sub.lat, sub.lon);
      elLat.textContent = f.lat;
      elLon.textContent = f.lon;

      if (manualDate === null) {
        elDate.value = dateInputValue(date);
        elSlider.value = sliderMinutes(date);
        updateSliderDisplay();
      }
      // Tell Cesium to redraw with the new sun position
      viewer.scene.requestRender();
    }
    update();
    setInterval(update, 1000);

    // ──────────────────────────────────────────────────────────────
    // Time control event handlers
    // ──────────────────────────────────────────────────────────────
    elSlider.addEventListener('input', () => {
      setManualMode();
      manualDate = buildManualDate();
      updateSliderDisplay();
      update();
    });
    elDate.addEventListener('change', () => {
      setManualMode();
      manualDate = buildManualDate();
      update();
    });
    elNowBtn.addEventListener('click', () => { setLiveMode(); update(); });

    // Initialize controls to current real time
    {
      const now = new Date();
      elDate.value = dateInputValue(now);
      elSlider.value = sliderMinutes(now);
      updateSliderDisplay();
    }

    // ──────────────────────────────────────────────────────────────
    // Geolocation: fly camera to user position, drop a marker
    // ──────────────────────────────────────────────────────────────
    elLocateBtn.addEventListener('click', () => {
      if (!('geolocation' in navigator)) {
        elLocateBtn.textContent = '브라우저 미지원';
        elLocateBtn.classList.add('error');
        return;
      }
      elLocateBtn.textContent = '위치 확인 중...';
      elLocateBtn.disabled = true;
      elLocateBtn.classList.remove('error', 'success');
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const lat = pos.coords.latitude;
          const lon = pos.coords.longitude;

          viewer.camera.flyTo({
            destination: Cesium.Cartesian3.fromDegrees(lon, lat, 2500000),
            orientation: {
              heading: 0,
              pitch: Cesium.Math.toRadians(-90),
              roll: 0
            },
            duration: 2.0
          });

          if (userMarker) viewer.entities.remove(userMarker);
          userMarker = viewer.entities.add({
            position: Cesium.Cartesian3.fromDegrees(lon, lat),
            point: {
              pixelSize: 12,
              color: Cesium.Color.fromCssColorString('#f4a261'),
              outlineColor: Cesium.Color.WHITE,
              outlineWidth: 1.5,
              disableDepthTestDistance: Number.POSITIVE_INFINITY
            }
          });

          const f = fmtLatLon(lat, lon);
          elUserLoc.textContent = f.lat + ' · ' + f.lon;
          elUserLocRow.style.display = '';
          elLocateBtn.classList.add('success');
          elLocateBtn.textContent = '✓ 이동됨';
          setTimeout(() => {
            elLocateBtn.classList.remove('success');
            elLocateBtn.textContent = '내 위치로 이동';
            elLocateBtn.disabled = false;
          }, 1800);
        },
        (err) => {
          let msg = '위치 확인 실패';
          if (err.code === 1) msg = '권한 거부됨';
          else if (err.code === 3) msg = '시간 초과';
          elLocateBtn.classList.add('error');
          elLocateBtn.textContent = msg;
          setTimeout(() => {
            elLocateBtn.classList.remove('error');
            elLocateBtn.textContent = '내 위치로 이동';
            elLocateBtn.disabled = false;
          }, 2000);
        },
        { enableHighAccuracy: false, timeout: 10000, maximumAge: 60000 }
      );
    });
  })();
  </script>
</body>
</html>
